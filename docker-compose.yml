services:
  web:
    build: .
    container_name: web_application_container
    ports:
      - "8080:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=secure_password
      - DB_NAME=my_app_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_database_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secure_password
      MYSQL_DATABASE: my_app_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
